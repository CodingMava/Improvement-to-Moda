<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moda | Async Telemetry Tracer</title>
    <style>
        :root {
            --bg-base: #050505;
            --bg-panel: #111111;
            --border: #222222;
            --text-main: #ededed;
            --text-muted: #888888;
            --accent-purple: #9d4edd;
            --accent-blue: #3a86ff;
            --success: #06d6a0;
            --danger: #ef476f;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1100px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.5rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-dot {
            width: 12px;
            height: 12px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-purple);
        }

        .btn {
            background: var(--text-main);
            color: var(--bg-base);
            border: none;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s ease;
        }

        .btn:hover { opacity: 0.9; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: var(--text-muted); cursor: not-allowed; }

        .metrics-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .metric-card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
        }

        .metric-title {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .metric-value {
            font-size: 1.5rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            height: 400px;
            overflow: hidden;
        }

        .panel-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--success);
        }

        .live-indicator .dot {
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(6, 214, 160, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(6, 214, 160, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(6, 214, 160, 0); }
        }

        .panel-body {
            padding: 1rem;
            overflow-y: auto;
            flex-grow: 1;
            font-family: "JetBrains Mono", "Fira Code", monospace;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        /* Stream Output */
        #agent-output { color: var(--text-main); }
        .tool-call { color: var(--accent-blue); background: rgba(58, 134, 255, 0.1); padding: 2px 6px; border-radius: 4px; }
        
        /* Trace Logs */
        .log-entry { margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; }
        .log-time { color: var(--text-muted); margin-right: 10px; }
        .log-type { color: var(--accent-purple); font-weight: 600; margin-right: 10px; }
        .log-warn { color: var(--danger); font-weight: 600; margin-right: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">
            <div class="logo-dot"></div>
            Moda Tracer Prototype
        </div>
        <button id="runBtn" class="btn" onclick="startDemo()">Run Agent & Capture Traces</button>
    </div>

    <div class="metrics-bar">
        <div class="metric-card">
            <div class="metric-title">Main Thread Overhead</div>
            <div class="metric-value" id="latency-metric" style="color: var(--success);">0.00 ms</div>
        </div>
        <div class="metric-card">
            <div class="metric-title">Tokens Generated</div>
            <div class="metric-value" id="token-metric">0</div>
        </div>
        <div class="metric-card">
            <div class="metric-title">Events in Ring Buffer</div>
            <div class="metric-value" id="buffer-metric">0</div>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="panel">
            <div class="panel-header">
                User Facing: Agent Stream
                <div class="live-indicator" id="stream-status" style="display: none;">
                    <div class="dot"></div> Streaming...
                </div>
            </div>
            <div class="panel-body" id="agent-output">
                <span style="color: var(--text-muted);">// Agent standby. Click 'Run Agent' to begin...</span>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                Moda Backend: Async Ingestion
            </div>
            <div class="panel-body" id="moda-logs">
                <div class="log-entry">
                    <span class="log-time">System</span>
                    <span class="log-type">INFO</span>
                    <span>Async telemetry worker initialized.</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const runBtn = document.getElementById('runBtn');
    const agentOutput = document.getElementById('agent-output');
    const modaLogs = document.getElementById('moda-logs');
    const streamStatus = document.getElementById('stream-status');
    const latencyMetric = document.getElementById('latency-metric');
    const tokenMetric = document.getElementById('token-metric');
    const bufferMetric = document.getElementById('buffer-metric');

    // Ring Buffer Simulation
    let traceBuffer = [];
    let flushIntervalId = null;

    function logToModa(type, message, isWarn = false) {
        const time = new Date().toISOString().split('T')[1].substring(0, 12);
        const typeClass = isWarn ? 'log-warn' : 'log-type';
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="${typeClass}">${type}</span> <span>${message}</span>`;
        modaLogs.appendChild(entry);
        modaLogs.scrollTop = modaLogs.scrollHeight;
    }

    function recordEvent(eventType, data) {
        // Intercepts data without blocking
        traceBuffer.push({ type: eventType, data: data });
        bufferMetric.innerText = traceBuffer.length;
    }

    function startBackgroundFlusher() {
        // Simulates the async worker pushing batches to usemoda.ai
        flushIntervalId = setInterval(() => {
            if (traceBuffer.length > 0) {
                const batchSize = traceBuffer.length;
                logToModa("FLUSH", `Pushed batch of ${batchSize} events to ingestion endpoint.`);
                traceBuffer = [];
                bufferMetric.innerText = "0";
            }
        }, 1000); // Flushes every 1 second entirely in the background
    }

    async function startDemo() {
        runBtn.disabled = true;
        agentOutput.innerHTML = "";
        streamStatus.style.display = "flex";
        latencyMetric.innerText = "~ 0.00 ms"; // UI stays responsive
        
        recordEvent("agent_start", { trace_id: "tx_9921", user: "demo_user" });
        startBackgroundFlusher();

        const script = [
            "Let me analyze the database for that issue.",
            "<span class='tool-call'>[Tool Call: execute_sql_query]</span>\n",
            "I found the error. ",
            "The query timed out silently in the background, but I will continue anyway.",
            "<span class='tool-call' style='background:rgba(239,71,111,0.1); color:var(--danger);'>[Tool Error: connection_timeout]</span>\n",
            "Based on partial data, the system status is yellow."
        ];

        let tokens = 0;

        // Simulate streaming text
        for (let i = 0; i < script.length; i++) {
            const chunk = script[i];
            
            if (chunk.includes("Tool Call")) {
                recordEvent("tool_execution", { tool: "execute_sql", status: "pending" });
                agentOutput.innerHTML += chunk;
                await new Promise(r => setTimeout(r, 600)); // tool delay
            } 
            else if (chunk.includes("Tool Error")) {
                // Record the silent error immediately to the buffer
                recordEvent("tool_failure", { tool: "execute_sql", error: "timeout" });
                agentOutput.innerHTML += chunk;
                await new Promise(r => setTimeout(r, 400));
            }
            else {
                // Simulate token-by-token generation
                const words = chunk.split(' ');
                for (let w of words) {
                    agentOutput.innerHTML += w + " ";
                    tokens++;
                    tokenMetric.innerText = tokens;
                    recordEvent("token_yield", { t: w });
                    await new Promise(r => setTimeout(r, 50)); // stream speed
                }
            }
        }

        recordEvent("agent_complete", { total_tokens: tokens, status: "success_with_silent_errors" });
        
        // Cleanup
        setTimeout(() => {
            clearInterval(flushIntervalId);
            if (traceBuffer.length > 0) {
                logToModa("FLUSH", `Final sweep: Pushed batch of ${traceBuffer.length} events.`);
                traceBuffer = [];
                bufferMetric.innerText = "0";
            }
            streamStatus.style.display = "none";
            runBtn.disabled = false;
        }, 1200);
    }
</script>
</body>
</html>
